<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Cadastro Mentoria</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Cadastro Mentoria</ion-title>
    </ion-toolbar>
  </ion-header>

  <form (submit)="submit()" style="padding:16px">
    <ion-item>
      <ion-label position="stacked">Título</ion-label>
      <ion-input [(ngModel)]="titulo" name="titulo" required maxlength="255"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Descrição</ion-label>
      <ion-textarea [(ngModel)]="descricao" name="descricao"></ion-textarea>
    </ion-item>

    <div style="margin-top:16px">
      <ion-button expand="block" type="submit">Salvar</ion-button>
    </div>
  </form>

</ion-content>
