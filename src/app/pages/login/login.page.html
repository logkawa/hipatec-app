<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">login</ion-title>
    </ion-toolbar>
  </ion-header>

  <main class="ion-padding">
    <ion-segment value="estudantes" (ionChange)="switchRole($event)">
      <ion-segment-button value="estudantes">
        <ion-label>Estudantes</ion-label>
      </ion-segment-button>
      <ion-segment-button value="mentoras">
        <ion-label>Mentoras</ion-label>
      </ion-segment-button>
    </ion-segment>

    <h2 style="margin-top:16px">{{ role === 'estudantes' ? 'Login Estudante' : 'Login Mentora' }}</h2>

    <ion-list>
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input [(ngModel)]="email" type="email" placeholder="seu@email.com"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Senha</ion-label>
        <ion-input [(ngModel)]="password" type="password" placeholder="sua senha"></ion-input>
      </ion-item>
    </ion-list>

    <ion-button expand="block" (click)="login()">Entrar como {{ role }}</ion-button>
  </main>
</ion-content>
