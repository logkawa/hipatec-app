<div class="container" [class.role-mentoras]="role === 'mentoras'">
    
    <div class="panel-left">
      <div class="logo-box">
        <img src="assets/logo_hipatec_roxo.png" alt="Hipatec" class="logo-img" />
      </div>
      <h2 class="comunidade-text">Junte-se à <span>&lt;Comunidade&gt;</span></h2>
      <p class="subtitle-text">
        Crie sua conta para se conectar, aprender e crescer com outras mulheres na tecnologia.
      </p>
    </div>

    <main>
      <h1 class="register-title">Crie sua conta</h1>

      <ion-segment [value]="role" (ionChange)="switchRole($event)" class="role-toggle">
        <ion-segment-button value="estudantes">
          <ion-label>Estudante</ion-label>
        </ion-segment-button>
        <ion-segment-button value="mentoras">
          <ion-label>Mentora</ion-label>
        </ion-segment-button>
      </ion-segment>

      <div class="input-group">
        <label>Nome completo</label>
        <input type="text" required [(ngModel)]="nome" placeholder="digite seu nome completo" />
      </div>

      <div class="input-group">
        <label>Data de nascimento</label>
        <input type="text" required [(ngModel)]="dataNascimento" placeholder="dd / mm / aaaa" onfocus="(this.type='date')" onblur="(this.type='text')" />
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" required [(ngModel)]="email" placeholder="seuemail@exemplo.com" />
      </div>

      <div class="input-group">
        <label>Usuário</label>
        <input type="text" required [(ngModel)]="usuario" placeholder="digite seu usuário" />
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" required [(ngModel)]="senha" placeholder="digite sua senha" />
      </div>

      <button class="btn-register" (click)="cadastrar()">Cadastrar</button>

      <div class="register-footer-links">
        <a class="footer-link" routerLink="/login">Já possui uma conta?</a>
      </div>
    </main>

</div>
