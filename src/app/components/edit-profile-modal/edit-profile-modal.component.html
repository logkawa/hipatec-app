<div class="edit-modal-backdrop" *ngIf="show">
  <div class="edit-modal-preview">
    
    <div class="modal-header">
      <button class="modal-close-btn" (click)="closeModal()">✕</button>
      <h3>Editar perfil</h3>
      <button class="btn-save" (click)="saveProfile()" [disabled]="saving">
        {{ saving ? 'Salvando...' : 'Salvar' }}
      </button>
    </div>

    <div class="modal-body-preview">
      
      <div class="preview-banner">
        <img *ngIf="previewBackground" [src]="previewBackground" alt="Capa" class="banner-img" />
        
        <label class="upload-overlay" for="bg-upload">
          <span class="upload-icon">📷 Alterar Capa</span>
        </label>
        <input id="bg-upload" type="file" accept="image/*" (change)="onBackgroundSelected($event)" class="hidden-file-input" />
      </div>

      <div class="preview-avatar-section">
        <div class="preview-avatar">
          <img *ngIf="previewPfp" [src]="previewPfp" alt="Perfil" class="avatar-img" />
          
          <label class="upload-overlay-circle" for="pfp-upload">
            <span class="upload-icon-circle">📷</span>
          </label>
          <input id="pfp-upload" type="file" accept="image/*" (change)="onPfpSelected($event)" class="hidden-file-input" />
        </div>
      </div>

      <div class="preview-info-section">
        <input type="text" class="input-name" placeholder="Nome de exibição" [(ngModel)]="editModel.nome" />
        
        <div class="input-username-row">
          <span class="arroba">@</span>
          <input type="text" class="input-username" placeholder="usuario" [(ngModel)]="editModel.usuario" />
        </div>
        
        <textarea class="input-bio" rows="3" placeholder="Adicione uma biografia..." [(ngModel)]="editModel.biografia"></textarea>
      </div>

    </div>
  </div>
</div>
